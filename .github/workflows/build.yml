name: Build WASM

# Builds the wasm-engine crate with wasm-pack + wasm-bindgen and produces
# the .wasm binary plus its JS glue/binding file (and .d.ts types) in pkg/.
#
# Runs automatically whenever the engine source changes, and can also be
# triggered manually from the Actions tab.

on:
  push:
    branches: [ main ]
    paths:
      - 'wasm-engine/**'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm-engine -> target

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Run native tests on the rules engine
        # Compiles and runs the crate's own test suite (perft, FEN
        # round-trip, etc.) on the host target before producing a wasm
        # artifact from it — fail fast if the logic itself is broken.
        working-directory: wasm-engine
        run: cargo test --release

      - name: Build wasm package
        run: >
          wasm-pack build wasm-engine
          --release
          --target web
          --out-dir ../pkg
          --out-name rusty_dragon

      - name: Upload pkg/ as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusty-dragon-wasm
          path: pkg/

      - name: Commit built files back to the repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild wasm bindings [skip ci]"
          file_pattern: pkg/*
